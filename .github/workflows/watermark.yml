name: Watermark Images

on:
  push:
    branches: [main]
    paths:
      - "public/images/**"
  pull_request:
    paths:
      - "public/images/**"
  schedule:
    - cron: "0 6 * * *"  # 每天 UTC 06:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watermark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watermark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PR 时检出到 PR head 分支
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-watermark.txt

      - name: Install StegaStamp dependencies (optional)
        if: env.STEGASTAMP_HF_REPO != ''
        run: pip install huggingface_hub
        env:
          STEGASTAMP_HF_REPO: ${{ secrets.STEGASTAMP_HF_REPO }}

      - name: Run watermark on all images
        run: python scripts/watermark.py process public/images
        env:
          STEGASTAMP_HF_REPO: ${{ secrets.STEGASTAMP_HF_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit watermarked images
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/
          git commit -m "$(cat <<'EOF'
          :lock: ci: 自动嵌入隐形水印 (DWT-DCT-SVD)

          [skip ci]
          EOF
          )"
          git push
